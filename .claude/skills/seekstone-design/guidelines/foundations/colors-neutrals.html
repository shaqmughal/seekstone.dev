<!-- @dsCard group="Colors" viewport="700x200" name="Neutrals — obsidian canvas" subtitle="Purple-tinted darks (hue ~260°) that tie us to Obsidian." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 7px; }
  .chip { height: 54px; border-radius: 9px; border: 1px solid var(--border-default); }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); }
  .use { font-family: var(--font-sans); font-size: 9.5px; color: var(--text-faint); }
  h4 { margin: 0 0 12px; font-family: var(--font-sans); font-size: 12px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.04em; text-transform: uppercase; }
</style>
</head>
<body>
  <h4>Neutrals — surfaces &amp; ink</h4>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--neutral-950)"></div><span class="name">950</span><span class="use">sunken</span></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-925)"></div><span class="name">925</span><span class="use">page</span></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-875)"></div><span class="name">875</span><span class="use">surface</span></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-850)"></div><span class="name">850</span><span class="use">raised</span></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-800)"></div><span class="name">800</span><span class="use">hover</span></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-700)"></div><span class="name">700</span><span class="use">border</span></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-400)"></div><span class="name">400</span><span class="use">muted</span></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-300)"></div><span class="name">300</span><span class="use">2nd text</span></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-50)"></div><span class="name">50</span><span class="use">text</span></div>
  </div>
</body>
</html>
