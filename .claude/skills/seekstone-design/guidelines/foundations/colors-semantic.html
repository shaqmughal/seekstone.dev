<!-- @dsCard group="Colors" viewport="700x180" name="Semantic — text & status" subtitle="Text hierarchy plus success / danger / link roles." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; display:flex; gap: 34px; }
  .col { display:flex; flex-direction: column; gap: 9px; }
  .col.flex { flex: 1; }
  .line { font-family: var(--font-sans); font-size: 14px; }
  .swrow { display:flex; align-items:center; gap: 10px; }
  .dot { width: 16px; height: 16px; border-radius: 5px; flex: none; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); }
  h4 { margin: 0 0 4px; font-family: var(--font-sans); font-size: 12px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.04em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="col flex">
    <h4>Text</h4>
    <span class="line" style="color:var(--text-primary)">Primary — search your vault in milliseconds</span>
    <span class="line" style="color:var(--text-secondary)">Secondary — ranked excerpts, not full notes</span>
    <span class="line" style="color:var(--text-muted)">Muted — filesystem-direct, no plugins</span>
    <span class="line" style="color:var(--text-link)">Link — read the benchmark →</span>
  </div>
  <div class="col">
    <h4>Status</h4>
    <div class="swrow"><span class="dot" style="background:var(--green-500)"></span><span class="lbl">green-500 · fastest</span></div>
    <div class="swrow"><span class="dot" style="background:var(--red-500)"></span><span class="lbl">red-500 · delete</span></div>
    <div class="swrow"><span class="dot" style="background:var(--violet-500)"></span><span class="lbl">violet-500 · accent</span></div>
    <div class="swrow"><span class="dot" style="background:var(--amber-500)"></span><span class="lbl">amber-500 · spark</span></div>
  </div>
</body>
</html>
