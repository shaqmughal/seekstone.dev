<!-- @dsCard group="Type" viewport="700x230" name="Display — Inter" subtitle="Hero & section headlines. Inter, tight tracking, negative leading." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; display:flex; flex-direction: column; gap: 14px; }
  .spec { display:flex; align-items: baseline; gap: 16px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); white-space: nowrap; width: 96px; flex: none; }
  .d1 { font-family: var(--font-display); font-weight: 800; font-size: 52px; letter-spacing: -0.04em; line-height: 1; color: var(--text-primary); }
  .d2 { font-family: var(--font-display); font-weight: 700; font-size: 34px; letter-spacing: -0.03em; line-height: 1.05; color: var(--text-primary); }
  .d3 { font-family: var(--font-display); font-weight: 600; font-size: 22px; letter-spacing: -0.02em; color: var(--text-primary); }
  em { font-style: normal; color: var(--violet-300); }
</style>
</head>
<body>
  <div class="spec"><span class="meta">5xl · 800</span><span class="d1">Search in <em>milliseconds</em></span></div>
  <div class="spec"><span class="meta">3xl · 700</span><span class="d2">Filesystem-direct, no plugins</span></div>
  <div class="spec"><span class="meta">xl · 600</span><span class="d3">16 tools your vault has been waiting for</span></div>
</body>
</html>
