<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="4 / 8px grid. --space-1 (4px) → --space-9 (64px)." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; }
  .row { display:flex; align-items: flex-end; gap: 18px; }
  .item { display:flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--gradient-gem); border-radius: 4px; width: 100%; }
  .box { display:flex; align-items: flex-end; width: 40px; height: 64px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
  h4 { margin: 0 0 16px; font-family: var(--font-sans); font-size: 12px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.04em; text-transform: uppercase; }
</style>
</head>
<body>
  <h4>Spacing — 4 / 8 grid</h4>
  <div class="row">
    <div class="item"><div class="box"><div class="bar" style="height:4px"></div></div><span class="lbl">1</span><span class="px">4</span></div>
    <div class="item"><div class="box"><div class="bar" style="height:8px"></div></div><span class="lbl">2</span><span class="px">8</span></div>
    <div class="item"><div class="box"><div class="bar" style="height:12px"></div></div><span class="lbl">3</span><span class="px">12</span></div>
    <div class="item"><div class="box"><div class="bar" style="height:16px"></div></div><span class="lbl">4</span><span class="px">16</span></div>
    <div class="item"><div class="box"><div class="bar" style="height:24px"></div></div><span class="lbl">5</span><span class="px">24</span></div>
    <div class="item"><div class="box"><div class="bar" style="height:32px"></div></div><span class="lbl">6</span><span class="px">32</span></div>
    <div class="item"><div class="box"><div class="bar" style="height:40px"></div></div><span class="lbl">7</span><span class="px">40</span></div>
    <div class="item"><div class="box"><div class="bar" style="height:48px"></div></div><span class="lbl">8</span><span class="px">48</span></div>
    <div class="item"><div class="box"><div class="bar" style="height:64px"></div></div><span class="lbl">9</span><span class="px">64</span></div>
  </div>
</body>
</html>
