<!-- @dsCard group="Type" viewport="700x230" name="Body & UI — Inter" subtitle="Lead, body, UI, and caption sizes with their roles." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; display:flex; flex-direction: column; gap: 13px; max-width: 640px; }
  .spec { display:flex; align-items: baseline; gap: 16px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); white-space: nowrap; width: 96px; flex: none; }
  .lead { font-size: 17px; line-height: 1.5; color: var(--text-secondary); }
  .body { font-size: 15px; line-height: 1.6; color: var(--text-secondary); }
  .ui { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .cap { font-size: 12px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="spec"><span class="meta">md · lead</span><span class="lead">A warm full-text index, held in-process — no subprocess, no HTTP round-trip.</span></div>
  <div class="spec"><span class="meta">base · body</span><span class="body">Seekstone returns ~200-character ranked excerpts instead of whole notes.</span></div>
  <div class="spec"><span class="meta">sm · ui</span><span class="ui">Copy install command</span></div>
  <div class="spec"><span class="meta">xs · caption</span><span class="cap">Benchmarked against 5 servers · 1,955 notes · 20 runs each</span></div>
</body>
</html>
