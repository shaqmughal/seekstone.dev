<!-- @dsCard group="Colors" viewport="700x170" name="Gradients & glows" subtitle="The gem sweep, the violet→amber spark, and brand glow halos." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; }
  .row { display:flex; gap: 14px; }
  .sw { flex: 1; display:flex; flex-direction: column; gap: 8px; }
  .panel { height: 76px; border-radius: 12px; border: 1px solid var(--border-subtle); }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); }
  h4 { margin: 0 0 12px; font-family: var(--font-sans); font-size: 12px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.04em; text-transform: uppercase; }
</style>
</head>
<body>
  <h4>Gradients &amp; glows</h4>
  <div class="row">
    <div class="sw"><div class="panel" style="background:var(--gradient-gem)"></div><span class="name">--gradient-gem</span></div>
    <div class="sw"><div class="panel" style="background:var(--gradient-spark)"></div><span class="name">--gradient-spark</span></div>
    <div class="sw"><div class="panel" style="background:var(--gradient-gem-soft); border-color: var(--border-violet)"></div><span class="name">--gradient-gem-soft</span></div>
    <div class="sw"><div class="panel" style="background:var(--surface); box-shadow: var(--glow-accent-lg)"></div><span class="name">--glow-accent-lg</span></div>
  </div>
</body>
</html>
