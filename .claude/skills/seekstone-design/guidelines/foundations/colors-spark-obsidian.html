<!-- @dsCard group="Colors" viewport="700x200" name="Spark + Obsidian anchors" subtitle="Seekstone's amber warmth, and the exact Obsidian brand values we extend." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; display:flex; flex-direction:column; gap: 18px; }
  .grp { }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 50px; border-radius: 10px; border: 1px solid var(--border-subtle); box-shadow: var(--ring-inset); }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); }
  h4 { margin: 0 0 12px; font-family: var(--font-sans); font-size: 12px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.04em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="grp">
    <h4>Amber — Seekstone spark</h4>
    <div class="row">
      <div class="sw"><div class="chip" style="background:var(--amber-300)"></div><span class="name">amber-300</span><span class="hex">#fcd34d</span></div>
      <div class="sw"><div class="chip" style="background:var(--amber-400)"></div><span class="name">amber-400</span><span class="hex">#fbbf24</span></div>
      <div class="sw"><div class="chip" style="background:var(--amber-500); box-shadow: var(--glow-spark)"></div><span class="name">amber-500</span><span class="hex">#f59e0b</span></div>
      <div class="sw"><div class="chip" style="background:var(--amber-600)"></div><span class="name">amber-600</span><span class="hex">#d97706</span></div>
    </div>
  </div>
  <div class="grp">
    <h4>Obsidian — anchor references</h4>
    <div class="row">
      <div class="sw"><div class="chip" style="background:var(--obsidian-purple)"></div><span class="name">obsidian-purple</span><span class="hex">#6c31e3</span></div>
      <div class="sw"><div class="chip" style="background:var(--obsidian-purple-light)"></div><span class="name">…-light</span><span class="hex">#a079ff</span></div>
      <div class="sw"><div class="chip" style="background:var(--obsidian-bg)"></div><span class="name">obsidian-bg</span><span class="hex">#1e1e2e</span></div>
      <div class="sw"><div class="chip" style="background:var(--bg-base)"></div><span class="name">bg-base</span><span class="hex">#110f18</span></div>
    </div>
  </div>
</body>
</html>
